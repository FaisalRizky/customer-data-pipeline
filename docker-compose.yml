services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-customer_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-customer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-server:
    build: ./mock-server
    container_name: mock_server
    ports:
      - "5000:5000"
    volumes:
      - ./mock-server:/app
    depends_on:
      postgres:
        condition: service_healthy

  pipeline-service:
    build: ./pipeline-service
    container_name: pipeline_service
    ports:
      - "8000:8000"
    volumes:
      - ./pipeline-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/customer_db}
      - FLASK_API_URL=${FLASK_API_URL:-http://mock-server:5000/api/customers}
      - FLASK_URL=${FLASK_URL:-http://mock-server:5000}
      - FASTAPI_URL=${FASTAPI_URL:-http://localhost:8000}
